<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>查看作品 - 贝贝的收藏</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ===== Detail Page Styles ===== */
    .detail-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    .detail-back {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      padding: 10px 20px;
      border-radius: 999px;
      border: 1px solid var(--border-light);
      background: rgba(255, 252, 247, 0.92);
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s ease, transform 0.2s ease;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .detail-back:hover {
      background: rgba(139, 122, 107, 0.1);
      transform: translateY(-1px);
    }

    .detail-container {
      max-width: 1200px;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 24px;
      align-items: start;
      margin-top: 60px;
    }

    .detail-image-area {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 24px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.04);
      min-height: 400px;
      max-height: 80vh;
    }

    .detail-image-area img {
      max-width: 100%;
      max-height: 80vh;
      object-fit: contain;
      border-radius: 20px;
      user-select: none;
      -webkit-user-drag: none;
    }

    .detail-nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid var(--border-light);
      background: rgba(255, 248, 240, 0.9);
      color: var(--text);
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease, transform 0.2s ease;
      backdrop-filter: blur(12px);
      z-index: 10;
      line-height: 1;
    }

    .detail-nav-btn:hover {
      background: rgba(139, 122, 107, 0.12);
      transform: translateY(-50%) scale(1.06);
    }

    .detail-nav-prev { left: 12px; }
    .detail-nav-next { right: 12px; }

    .detail-counter {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 16px;
      border-radius: 999px;
      background: rgba(255, 248, 240, 0.9);
      border: 1px solid var(--border-light);
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 700;
      backdrop-filter: blur(8px);
    }

    .detail-info-panel {
      padding: 28px;
      border-radius: 24px;
      background: rgba(255, 252, 247, 0.92);
      border: 1px solid var(--border-light);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .detail-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-heading);
      word-break: break-word;
    }

    .detail-category-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(124, 184, 156, 0.12);
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 500;
      width: fit-content;
    }

    .detail-memory-section {
      margin-top: 8px;
    }

    .detail-memory-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-heading);
      margin-bottom: 8px;
    }

    .detail-note {
      color: var(--muted);
      line-height: 1.8;
      white-space: pre-wrap;
      font-size: 0.93rem;
    }

    .detail-edit-btn {
      margin-top: 12px;
      padding: 10px 20px;
      border-radius: 999px;
      border: 1px solid rgba(232, 152, 110, 0.25);
      background: rgba(232, 152, 110, 0.1);
      color: var(--accent-strong);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.2s ease, transform 0.2s ease;
      display: none;
    }

    .detail-edit-btn:hover {
      background: rgba(232, 152, 110, 0.18);
      transform: translateY(-1px);
    }

    .detail-footer {
      text-align: center;
      padding: 16px;
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 500;
    }

    .detail-keyboard-hint {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 18px;
      border-radius: 999px;
      background: rgba(255, 248, 240, 0.85);
      border: 1px solid var(--border-light);
      color: var(--muted);
      font-size: 0.78rem;
      backdrop-filter: blur(8px);
      white-space: nowrap;
    }

    .detail-loader {
      position: absolute;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(139, 122, 107, 0.08);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .detail-error {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .detail-error h2 {
      font-size: 1.6rem;
      margin-bottom: 12px;
      color: var(--text-heading);
    }

    .detail-error p {
      font-size: 1rem;
      margin-bottom: 20px;
    }

    @media (max-width: 900px) {
      .detail-container {
        grid-template-columns: 1fr;
        margin-top: 50px;
      }

      .detail-info-panel {
        padding: 20px;
      }

      .detail-image-area {
        min-height: 280px;
      }
    }

    @media (max-width: 480px) {
      .detail-back {
        top: 12px;
        left: 12px;
        padding: 8px 14px;
        font-size: 0.82rem;
      }

      .detail-nav-btn {
        width: 36px;
        height: 36px;
        font-size: 1.2rem;
      }

      .detail-title {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <canvas id="particleCanvas" class="particle-canvas"></canvas>
    <canvas id="sakuraCanvas" class="sakura-canvas"></canvas>

    <a href="index.html" class="detail-back">← 返回画廊</a>

    <div class="detail-page">
      <div class="detail-container" id="detailContainer" style="display:none;">
        <!-- Image Area -->
        <div class="detail-image-area" id="detailImageArea">
          <div class="detail-loader" id="detailLoader"></div>
          <img id="detailImage" src="" alt="" />
          <button class="detail-nav-btn detail-nav-prev" id="detailPrev" title="上一张">◂</button>
          <button class="detail-nav-btn detail-nav-next" id="detailNext" title="下一张">▸</button>
          <div class="detail-counter" id="detailCounter">1 / 1</div>
        </div>

        <!-- Info Panel -->
        <div class="detail-info-panel">
          <div class="detail-title" id="detailTitle">🌸 加载中...</div>
          <div class="detail-category-badge" id="detailCategory"></div>
          <div class="detail-memory-section">
            <div class="detail-memory-title" id="detailMemoryTitle">📝 贝贝的回忆</div>
            <div class="detail-note" id="detailNote">加载中...</div>
          </div>
          <a class="detail-edit-btn" id="detailEditBtn">✏️ 编辑此作品（管理）</a>
        </div>
      </div>

      <!-- Error state -->
      <div class="detail-error" id="detailError" style="display:none;">
        <h2>😢 未找到作品</h2>
        <p>该作品可能已被移除或链接无效。</p>
        <a href="index.html" class="btn">返回画廊</a>
      </div>

      <div class="detail-footer">💚 每一张作品，都是珍贵的回忆</div>
    </div>

    <div class="detail-keyboard-hint">⌨️ ← → 切换 · ESC 返回</div>
  </div>

  <script src="manifest.js"></script>
  <script>
    // ============================================================
    //  Detail Page — 使用文件名(name)标识替代数字索引
    // ============================================================

    const STORAGE_KEY = 'gallery_admin_data';
    const AUTH_KEY = 'gallery_admin_auth';
    const ORDER_KEY = 'gallery_image_order';

    // ===== 安全工具 =====
    function sanitizeText(str, maxLen = 5000) {
      if (!str || typeof str !== 'string') return '';
      return str.slice(0, maxLen).replace(/<[^>]*>/g, '').replace(/javascript:/gi, '').replace(/on\w+\s*=/gi, '').trim();
    }

    function escapeHtml(str) {
      if (!str || typeof str !== 'string') return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function safeParseJSON(raw, fallback = null) {
      if (!raw || typeof raw !== 'string') return fallback;
      try { const p = JSON.parse(raw); return (typeof p === 'object' && p !== null) ? p : fallback; } catch (e) { return fallback; }
    }

    // ===== 分类数据 =====
    const categories = (typeof GALLERY_MANIFEST !== 'undefined' && GALLERY_MANIFEST.categories)
      ? GALLERY_MANIFEST.categories.map(c => ({ id: c.id, name: c.name, icon: c.icon, desc: c.desc }))
      : [
          { id: 1, name: '入坑和启蒙', icon: '🌱' },
          { id: 2, name: '青春和热爱', icon: '💫' },
          { id: 3, name: '那些无可替代的夏天', icon: '☀️' },
          { id: 4, name: '近来的优秀作品', icon: '🌟' },
          { id: 5, name: '其他优秀作品', icon: '✨' },
        ];

    // ===== 构建可见图片列表 =====
    function buildVisibleImages() {
      if (typeof GALLERY_MANIFEST === 'undefined' || !GALLERY_MANIFEST.images) return [];

      let worksData = {};
      try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) worksData = JSON.parse(raw); } catch (e) {}

      return GALLERY_MANIFEST.images.filter(img => {
        const saved = worksData[img.name];
        const ov = img.overrides;
        // 排除隐藏的
        if (saved && saved.hidden) return false;
        if (ov && ov.hidden) return false;
        return true;
      }).map(img => {
        const saved = worksData[img.name];
        const ov = img.overrides;

        const title = (saved && saved.title) ? saved.title
          : (ov && ov.title) ? ov.title
          : img.name.replace(/\.[^.]+$/, '');

        const note = (saved && typeof saved.note === 'string') ? saved.note
          : (ov && typeof ov.note === 'string') ? ov.note
          : '';

        const category = (saved && typeof saved.category === 'number' && saved.category >= 1 && saved.category <= 5) ? saved.category
          : (ov && typeof ov.category === 'number' && ov.category >= 1 && ov.category <= 5) ? ov.category
          : img.category;

        return {
          name: img.name,
          src: img.src,
          title: title,
          note: note,
          category: category,
          mtime: img.mtime
        };
      });
    }

    // ===== 主逻辑 =====
    const allImages = buildVisibleImages();
    const params = new URLSearchParams(window.location.search);

    // 支持 name 参数（新方式）和 index 参数（向后兼容）
    let currentIndex = -1;

    const nameParam = params.get('name');
    const indexParam = params.get('index');

    if (nameParam) {
      // 新方式：通过文件名查找
      const decodedName = decodeURIComponent(nameParam);
      currentIndex = allImages.findIndex(img => img.name === decodedName);
    } else if (indexParam !== null) {
      // 向后兼容：数字索引（但可能不准确）
      const idx = parseInt(indexParam, 10);
      if (!isNaN(idx) && idx >= 0 && idx < allImages.length) {
        currentIndex = idx;
      }
    }

    // DOM 引用
    const detailContainer = document.getElementById('detailContainer');
    const detailError = document.getElementById('detailError');
    const detailImage = document.getElementById('detailImage');
    const detailLoader = document.getElementById('detailLoader');
    const detailTitle = document.getElementById('detailTitle');
    const detailCategory = document.getElementById('detailCategory');
    const detailNote = document.getElementById('detailNote');
    const detailMemoryTitle = document.getElementById('detailMemoryTitle');
    const detailCounter = document.getElementById('detailCounter');
    const detailPrev = document.getElementById('detailPrev');
    const detailNext = document.getElementById('detailNext');
    const detailEditBtn = document.getElementById('detailEditBtn');

    if (currentIndex < 0 || allImages.length === 0) {
      // 未找到
      detailError.style.display = 'block';
      detailContainer.style.display = 'none';
    } else {
      detailContainer.style.display = '';
      detailError.style.display = 'none';
      renderDetail();
    }

    function renderDetail() {
      const item = allImages[currentIndex];
      if (!item) return;

      // 更新 URL（不刷新页面），保持使用 name 参数
      const newUrl = `detail.html?name=${encodeURIComponent(item.name)}`;
      if (window.location.search !== `?name=${encodeURIComponent(item.name)}`) {
        history.replaceState(null, '', newUrl);
      }

      // 图片加载
      detailLoader.style.display = '';
      detailImage.style.opacity = '0';
      detailImage.src = item.src;
      detailImage.alt = sanitizeText(item.name);
      detailImage.onload = () => {
        detailLoader.style.display = 'none';
        detailImage.style.opacity = '1';
      };
      detailImage.onerror = () => {
        detailLoader.style.display = 'none';
        detailImage.style.opacity = '0.5';
      };

      // 标题
      detailTitle.textContent = sanitizeText(item.title || item.name.replace(/\.[^.]+$/, ''), 200);
      document.title = `${sanitizeText(item.title, 60)} - 贝贝的收藏`;

      // 分类
      const cat = categories.find(c => c.id === (item.category || 5));
      if (cat) {
        detailCategory.textContent = `${cat.icon} ${cat.name}`;
        detailCategory.style.display = '';
      } else {
        detailCategory.style.display = 'none';
      }

      // 回忆
      const note = sanitizeText(item.note, 5000);
      detailNote.textContent = note || '✏️ 等待贝贝写下回忆...';
      detailMemoryTitle.textContent = note ? '📝 贝贝的回忆' : '📝 贝贝的回忆（待填写）';

      // 计数器
      detailCounter.textContent = `${currentIndex + 1} / ${allImages.length}`;

      // 管理员编辑按钮
      const isAdmin = (sessionStorage.getItem(AUTH_KEY) || localStorage.getItem(AUTH_KEY)) === 'true';
      if (isAdmin) {
        detailEditBtn.style.display = 'block';
        detailEditBtn.href = `index.html#edit=${encodeURIComponent(item.name)}`;
      } else {
        detailEditBtn.style.display = 'none';
      }
    }

    function navigate(direction) {
      if (allImages.length <= 1) return;
      currentIndex = (currentIndex + direction + allImages.length) % allImages.length;
      renderDetail();
    }

    // 导航按钮
    detailPrev.addEventListener('click', () => navigate(-1));
    detailNext.addEventListener('click', () => navigate(1));

    // 键盘快捷键
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      switch (e.key) {
        case 'ArrowLeft': navigate(-1); break;
        case 'ArrowRight': navigate(1); break;
        case 'Escape': window.location.href = 'index.html'; break;
      }
    });

    // 触摸滑动
    let touchStartX = 0;
    let touchMoved = false;
    const imageArea = document.getElementById('detailImageArea');

    imageArea.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) { touchStartX = e.touches[0].clientX; touchMoved = false; }
    }, { passive: true });

    imageArea.addEventListener('touchmove', (e) => {
      if (e.touches.length === 1 && Math.abs(e.touches[0].clientX - touchStartX) > 20) touchMoved = true;
    }, { passive: true });

    imageArea.addEventListener('touchend', (e) => {
      if (!touchMoved) return;
      const dx = (e.changedTouches[0]?.clientX || 0) - touchStartX;
      if (Math.abs(dx) > 50) navigate(dx > 0 ? -1 : 1);
    });

    // ===== 粒子背景（简化版） =====
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    const sakuraCanvas = document.getElementById('sakuraCanvas');
    const sakuraCtx = sakuraCanvas.getContext('2d');

    function resizeCanvas() {
      const w = window.innerWidth, h = window.innerHeight;
      const dpr = devicePixelRatio || 1;
      canvas.width = w * dpr; canvas.height = h * dpr;
      canvas.style.width = `${w}px`; canvas.style.height = `${h}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      sakuraCanvas.width = w * dpr; sakuraCanvas.height = h * dpr;
      sakuraCanvas.style.width = `${w}px`; sakuraCanvas.style.height = `${h}px`;
      sakuraCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    const particles = [];
    for (let i = 0; i < 30; i++) {
      particles.push({
        x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight,
        vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
        radius: 1 + Math.random() * 1.5, alpha: 0.04 + Math.random() * 0.1
      });
    }

    function animateParticles() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < -20) p.x = window.innerWidth + 20;
        if (p.x > window.innerWidth + 20) p.x = -20;
        if (p.y < -20) p.y = window.innerHeight + 20;
        if (p.y > window.innerHeight + 20) p.y = -20;
        ctx.beginPath();
        ctx.fillStyle = `rgba(124, 184, 156, ${p.alpha})`;
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();
      });
      requestAnimationFrame(animateParticles);
    }

    const sakuraPetals = [];
    for (let i = 0; i < 20; i++) {
      sakuraPetals.push({
        x: Math.random() * window.innerWidth, y: Math.random() * -window.innerHeight,
        size: 8 + Math.random() * 14, speedY: 0.3 + Math.random() * 0.8,
        speedX: -0.2 + Math.random() * 0.4,
        rotation: Math.random() * Math.PI * 2, rotationSpeed: (Math.random() - 0.5) * 0.02,
        sway: Math.random() * Math.PI * 2, swaySpeed: 0.01 + Math.random() * 0.015,
        swayAmount: 0.5 + Math.random() * 2, alpha: 0.3 + Math.random() * 0.4
      });
    }

    function animateSakura() {
      sakuraCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      sakuraPetals.forEach(p => {
        p.y += p.speedY; p.sway += p.swaySpeed;
        p.x += p.speedX + Math.sin(p.sway) * p.swayAmount * 0.3;
        p.rotation += p.rotationSpeed;
        if (p.y > window.innerHeight + 40) { p.y = -40; p.x = Math.random() * window.innerWidth; }
        if (p.x < -40) p.x = window.innerWidth + 40;
        if (p.x > window.innerWidth + 40) p.x = -40;
        sakuraCtx.save(); sakuraCtx.translate(p.x, p.y); sakuraCtx.rotate(p.rotation);
        sakuraCtx.globalAlpha = p.alpha;
        sakuraCtx.fillStyle = `rgba(255, 183, 197, ${p.alpha})`;
        const w = p.size * 0.35, h = p.size * 0.55;
        sakuraCtx.beginPath(); sakuraCtx.moveTo(0, -h);
        sakuraCtx.bezierCurveTo(w, -h * 0.6, w, h * 0.3, 0, h);
        sakuraCtx.bezierCurveTo(-w, h * 0.3, -w, -h * 0.6, 0, -h);
        sakuraCtx.fill(); sakuraCtx.restore();
      });
      requestAnimationFrame(animateSakura);
    }

    resizeCanvas();
    animateParticles();
    animateSakura();
    window.addEventListener('resize', resizeCanvas);
  </script>
</body>
</html>
